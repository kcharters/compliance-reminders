<!DOCTYPE html>
<html>
<body style="font-family:system-ui,sans-serif;color:#111;max-width:600px;margin:auto">
  <div style="background:#10b981;padding:20px 32px;border-radius:8px 8px 0 0">
    <h2 style="color:#fff;margin:0">📋 Policy Renewal Reminder</h2>
  </div>
  <div style="border:1px solid #e5e7eb;border-top:none;padding:24px 32px;border-radius:0 0 8px 8px">
    <p>Hi team,</p>
    <p>The <strong>Acceptable Use Policy</strong> renewal is due in
      <strong>{{ days_remaining }} day{{ 's' if days_remaining != 1 else '' }}</strong>
      ({{ deadline }}).
    </p>
    <p>Please review and re-sign the policy via the HR portal before the deadline.</p>
    <hr style="border:none;border-top:1px solid #e5e7eb;margin:20px 0">
    <p style="font-size:12px;color:#9ca3af">Automated reminder — do not reply.</p>
  </div>
</body>
</html>
